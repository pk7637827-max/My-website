<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Location</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --panel: #0d1318;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #c8d8e8;
    --muted: #4a6070;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container { width: 100%; max-width: 580px; position: relative; }
  header { margin-bottom: 2rem; }

  .tag {
    font-size: 0.65rem; color: var(--accent);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 0.4rem; opacity: 0.7;
  }

  h1 {
    font-family: var(--sans); font-size: 2.2rem;
    font-weight: 800; color: #fff;
    letter-spacing: -0.02em; line-height: 1;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.75rem; color: var(--muted);
    margin-top: 0.5rem; letter-spacing: 0.05em;
  }

  .input-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }

  input[type="text"] {
    flex: 1; background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono);
    font-size: 0.85rem; padding: 0.75rem 1rem;
    outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    background: var(--accent); color: #000; border: none;
    font-family: var(--sans); font-weight: 700; font-size: 0.8rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.75rem 1.25rem; cursor: pointer;
    transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  button:hover { background: #33ecff; }
  button:active { transform: scale(0.97); }

  button.secondary {
    background: transparent; color: var(--accent);
    border: 1px solid var(--border);
  }
  button.secondary:hover { border-color: var(--accent); background: rgba(0,229,255,0.05); }

  .controls { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }

  .api-selector {
    display: flex; gap: 0.4rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .api-btn {
    font-size: 0.65rem; padding: 0.3rem 0.7rem;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); cursor: pointer;
    font-family: var(--mono); letter-spacing: 0.08em;
    text-transform: uppercase; transition: all 0.2s;
  }
  .api-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,255,0.07); }
  .api-btn:hover { color: var(--text); border-color: var(--muted); }
  .api-label {
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    align-self: center; margin-right: 0.3rem;
  }

  .panel {
    background: var(--panel); border: 1px solid var(--border);
    position: relative; overflow: hidden;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .panel.visible { opacity: 1; transform: translateY(0); }
  .panel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: linear-gradient(90deg, var(--accent), transparent);
  }

  .panel-header {
    padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.7rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite; flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .dot.red { background: #ff4444; box-shadow: 0 0 8px #ff4444; animation: none; }
  .dot.green { background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: none; }

  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }

  .field {
    padding: 1rem; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border); overflow: hidden;
  }
  .field:nth-child(2n) { border-right: none; }
  .field:nth-last-child(-n+2) { border-bottom: none; }
  .field.wide { grid-column: 1 / -1; border-right: none; }
  .field:only-child { border-bottom: none; }

  .field-label {
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.3rem;
  }
  .field-value {
    font-size: 0.9rem; color: #fff;
    word-break: break-all; min-height: 1.2em;
  }
  .field-value.accent { color: var(--accent); }
  .field-value.highlight { color: var(--accent2); }

  .skeleton {
    height: 0.9em;
    background: linear-gradient(90deg, var(--border) 25%, #1e3040 50%, var(--border) 75%);
    background-size: 200% 100%; animation: shimmer 1.2s infinite;
    border-radius: 2px; width: 75%;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .map-link {
    display: inline-flex; align-items: center; gap: 0.3rem;
    color: var(--accent); text-decoration: none; font-size: 0.75rem;
    margin-top: 0.3rem; transition: opacity 0.2s;
  }
  .map-link:hover { opacity: 0.7; }

  .status {
    font-size: 0.7rem; color: var(--muted);
    margin-top: 1rem; text-align: center;
    letter-spacing: 0.08em; min-height: 1.2rem;
  }
  .status.error { color: #ff4444; }
  .status.success { color: #00ff88; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="tag">// network utility v2</div>
    <h1>IP <span>LOCATE</span></h1>
    <p class="subtitle">Geolocation · Timezone · ISP · Coordinates</p>
  </header>

  <div class="input-row">
    <input type="text" id="ipInput" placeholder="IP address daalo ya khali chodo (apna IP)" />
    <button onclick="lookup()">SCAN</button>
  </div>

  <div class="controls">
    <button class="secondary" onclick="lookupMyIp()">🌐 MERA IP</button>
    <button class="secondary" onclick="testIP('8.8.8.8')">Google DNS</button>
    <button class="secondary" onclick="testIP('1.1.1.1')">Cloudflare</button>
    <button class="secondary" onclick="clearPanel()">✕ CLEAR</button>
  </div>

  <div class="api-selector">
    <span class="api-label">API:</span>
    <button class="api-btn active" id="api1" onclick="selectApi(1)">ip-api.com</button>
    <button class="api-btn" id="api2" onclick="selectApi(2)">ipapi.co</button>
    <button class="api-btn" id="api3" onclick="selectApi(3)">freeipapi.com</button>
  </div>

  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="dot" id="statusDot"></div>
      <span id="panelTitle">RESULT</span>
    </div>
    <div class="fields" id="fields"></div>
  </div>

  <div class="status" id="status"></div>

</div>

<script>
  let selectedApi = 1;

  function selectApi(n) {
    selectedApi = n;
    document.querySelectorAll('.api-btn').forEach((b,i) => {
      b.classList.toggle('active', i+1 === n);
    });
    setStatus('API changed: ' + ['ip-api.com','ipapi.co','freeipapi.com'][n-1]);
  }

  function testIP(ip) {
    document.getElementById('ipInput').value = ip;
    lookup();
  }

  function setStatus(msg, type='') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function showSkeleton() {
    const labels = ['IP ADDRESS','COUNTRY','CITY','REGION','POSTAL','TIMEZONE','ISP / ORG','COORDINATES'];
    document.getElementById('fields').innerHTML = labels.map((label, i) => `
      <div class="field${i >= 6 ? ' wide' : ''}">
        <div class="field-label">${label}</div>
        <div class="field-value"><div class="skeleton"></div></div>
      </div>
    `).join('');
    document.getElementById('panel').classList.add('visible');
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('panelTitle').textContent = 'SCANNING...';
    setStatus('Data fetch ho raha hai...');
  }

  function renderData(d) {
    const lat = d.lat ?? d.latitude ?? '—';
    const lon = d.lon ?? d.longitude ?? '—';
    const mapUrl = (lat !== '—') ? `https://www.google.com/maps?q=${lat},${lon}` : null;
    const ip = d.query || d.ip || d.ipAddress || '—';
    const country = d.country || d.country_name || '—';
    const countryCode = d.countryCode || d.country_code || '';
    const region = d.regionName || d.region || d.region_name || '—';
    const city = d.city || '—';
    const postal = d.zip || d.postal || d.zipCode || '—';
    const timezone = d.timezone || '—';
    const isp = d.isp || d.org || d.isp_name || '—';

    document.getElementById('fields').innerHTML = `
      <div class="field wide">
        <div class="field-label">IP ADDRESS</div>
        <div class="field-value accent">${ip}</div>
      </div>
      <div class="field">
        <div class="field-label">COUNTRY</div>
        <div class="field-value">${country} ${countryCode ? '('+countryCode+')':''}</div>
      </div>
      <div class="field">
        <div class="field-label">REGION</div>
        <div class="field-value">${region}</div>
      </div>
      <div class="field">
        <div class="field-label">CITY</div>
        <div class="field-value highlight">${city}</div>
      </div>
      <div class="field">
        <div class="field-label">POSTAL CODE</div>
        <div class="field-value">${postal}</div>
      </div>
      <div class="field wide">
        <div class="field-label">TIMEZONE</div>
        <div class="field-value">${timezone}</div>
      </div>
      <div class="field wide">
        <div class="field-label">ISP / ORG</div>
        <div class="field-value">${isp}</div>
      </div>
      <div class="field wide">
        <div class="field-label">COORDINATES</div>
        <div class="field-value">
          ${lat !== '—' ? `${lat}°, ${lon}°` : '—'}
          ${mapUrl ? `<br><a class="map-link" href="${mapUrl}" target="_blank">↗ Google Maps mein dekho</a>` : ''}
        </div>
      </div>
    `;

    document.getElementById('statusDot').className = 'dot green';
    document.getElementById('panelTitle').textContent = 'SCAN COMPLETE ✓';
    setStatus('✓ Data mil gaya · ' + new Date().toLocaleTimeString(), 'success');
  }

  async function fetchApi1(ip) {
    const url = ip
      ? `https://ip-api.com/json/${ip}?fields=status,message,country,countryCode,regionName,city,zip,lat,lon,timezone,isp,org,query`
      : `https://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,zip,lat,lon,timezone,isp,org,query`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.status === 'fail') throw new Error(data.message || 'Lookup failed');
    return data;
  }

  async function fetchApi2(ip) {
    const url = ip ? `https://ipapi.co/${ip}/json/` : `https://ipapi.co/json/`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.reason || 'Lookup failed');
    return data;
  }

  async function fetchApi3(ip) {
    const url = ip ? `https://freeipapi.com/api/json/${ip}` : `https://freeipapi.com/api/json`;
    const res = await fetch(url);
    return await res.json();
  }

  async function lookup() {
    const ip = document.getElementById('ipInput').value.trim();
    showSkeleton();
    try {
      let data;
      if (selectedApi === 1) data = await fetchApi1(ip);
      else if (selectedApi === 2) data = await fetchApi2(ip);
      else data = await fetchApi3(ip);
      renderData(data);
    } catch (err) {
      document.getElementById('statusDot').className = 'dot red';
      document.getElementById('panelTitle').textContent = 'ERROR ✗';
      document.getElementById('fields').innerHTML = `
        <div class="field wide">
          <div class="field-label">ERROR</div>
          <div class="field-value" style="color:#ff4444">${err.message}</div>
        </div>
        <div class="field wide" style="border-bottom:none">
          <div class="field-label">SUGGESTION</div>
          <div class="field-value" style="font-size:0.8rem;color:var(--muted)">
            Upar se doosri API try karo (ip-api.com / ipapi.co / freeipapi.com)
          </div>
        </div>
      `;
      setStatus('❌ Error: ' + err.message, 'error');
    }
  }

  async function lookupMyIp() {
    document.getElementById('ipInput').value = '';
    await lookup();
  }

  function clearPanel() {
    document.getElementById('panel').classList.remove('visible');
    document.getElementById('fields').innerHTML = '';
    document.getElementById('status').textContent = '';
    document.getElementById('ipInput').value = '';
  }

  lookupMyIp();
</script>
</body>
</html>
